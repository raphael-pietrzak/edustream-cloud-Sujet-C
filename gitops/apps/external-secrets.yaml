# Vault dev-mode → K8s Secret via External Secrets Operator.
# Prereq: scripts/install-platform.sh has installed vault + external-secrets
# and seeded secrets `secret/courses-api`, `secret/postgresql`.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata: { name: vault-backend }
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: courses-api-secret, namespace: app }
spec:
  refreshInterval: 30s
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target: { name: courses-api-secret }
  data:
    - secretKey: PGPASSWORD
      remoteRef: { key: courses-api, property: pg_password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: postgresql-secret, namespace: data }
spec:
  refreshInterval: 30s
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target: { name: postgresql-secret }
  data:
    - secretKey: PGPASSWORD
      remoteRef: { key: postgresql, property: pg_password }
