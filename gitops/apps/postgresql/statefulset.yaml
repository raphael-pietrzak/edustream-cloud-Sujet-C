apiVersion: v1
kind: Service
metadata: { name: postgresql, namespace: data }
spec:
  selector: { app.kubernetes.io/name: postgresql }
  ports: [{ name: pg, port: 5432, targetPort: 5432 }]
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: data
  labels: { app.kubernetes.io/name: postgresql, team: edustream, env: dev }
spec:
  serviceName: postgresql
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: postgresql } }
  template:
    metadata: { labels: { app.kubernetes.io/name: postgresql, team: edustream, env: dev } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: edustream }
            - { name: POSTGRES_USER, value: edustream }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: postgresql-secret, key: PGPASSWORD } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec: { command: [pg_isready, -U, edustream] }
            initialDelaySeconds: 5
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 2Gi } }
