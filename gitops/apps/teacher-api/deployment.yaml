apiVersion: v1
kind: ServiceAccount
metadata: { name: teacher-api, namespace: app }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teacher-api
  namespace: app
  labels:
    app.kubernetes.io/name: teacher-api
    app.kubernetes.io/part-of: edustream
    team: edustream
    env: dev
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: teacher-api } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: teacher-api
        app.kubernetes.io/part-of: edustream
        team: edustream
        env: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: teacher-api
      containers:
        - name: teacher-api
          image: ghcr.io/raphaelpietrzak/edustream/teacher-api:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 3004, name: http }]
          env:
            - { name: PORT, value: "3004" }
            - { name: MONGO_URI, value: mongodb://mongodb.data.svc.cluster.local:27017 }
            - { name: POLL_MS, value: "2000" }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 300m, memory: 256Mi }
          readinessProbe: { httpGet: { path: /ready, port: 3004 }, initialDelaySeconds: 3 }
          livenessProbe:  { httpGet: { path: /health, port: 3004 }, initialDelaySeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: teacher-api, namespace: app }
spec:
  selector: { app.kubernetes.io/name: teacher-api }
  ports: [{ name: http, port: 80, targetPort: 3004 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teacher-api
  namespace: app
spec:
  ingressClassName: nginx
  rules:
    - host: teacher.edustream.local
      http:
        paths:
          - { path: /, pathType: Prefix, backend: { service: { name: teacher-api, port: { number: 80 } } } }
