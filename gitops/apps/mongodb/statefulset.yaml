apiVersion: v1
kind: Service
metadata: { name: mongodb, namespace: data }
spec:
  selector: { app.kubernetes.io/name: mongodb }
  ports: [{ name: mongo, port: 27017, targetPort: 27017 }]
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: data
  labels: { app.kubernetes.io/name: mongodb, team: edustream, env: dev }
spec:
  serviceName: mongodb
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: mongodb } }
  template:
    metadata: { labels: { app.kubernetes.io/name: mongodb, team: edustream, env: dev } }
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports: [{ containerPort: 27017 }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec: { command: [mongosh, --quiet, --eval, "db.runCommand('ping').ok"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /data/db }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 2Gi } }
