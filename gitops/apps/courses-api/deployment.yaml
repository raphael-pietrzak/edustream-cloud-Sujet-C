apiVersion: v1
kind: ServiceAccount
metadata: { name: courses-api, namespace: app }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: courses-api
  namespace: app
  labels:
    app.kubernetes.io/name: courses-api
    app.kubernetes.io/part-of: edustream
    team: edustream
    env: dev
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: courses-api } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: courses-api
        app.kubernetes.io/part-of: edustream
        team: edustream
        env: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: courses-api
      containers:
        - name: courses-api
          image: ghcr.io/raphaelpietrzak/edustream/courses-api:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 3001, name: http }]
          env:
            - { name: PORT, value: "3001" }
            - { name: PGHOST, value: postgresql.data.svc.cluster.local }
            - { name: PGUSER, value: edustream }
            - { name: PGDATABASE, value: edustream }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: courses-api-secret, key: PGPASSWORD } }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 300m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /ready, port: 3001 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: courses-api
  namespace: app
  labels: { app.kubernetes.io/name: courses-api }
spec:
  selector: { app.kubernetes.io/name: courses-api }
  ports: [{ name: http, port: 80, targetPort: 3001 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: courses-api
  namespace: app
  annotations: { nginx.ingress.kubernetes.io/rewrite-target: / }
spec:
  ingressClassName: nginx
  rules:
    - host: courses.edustream.local
      http:
        paths:
          - { path: /, pathType: Prefix, backend: { service: { name: courses-api, port: { number: 80 } } } }
