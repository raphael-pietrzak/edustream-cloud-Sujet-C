name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [courses-api, answers-ingest, stats-aggregator, teacher-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - name: Install
        working-directory: services/${{ matrix.service }}
        run: npm install --no-audit --no-fund
      - name: Test
        working-directory: services/${{ matrix.service }}
        run: npm test

  build-scan-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        service: [courses-api, answers-ingest, stats-aggregator, teacher-api]
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase repository
        run: echo "IMAGE_PREFIX=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  bump-gitops:
    needs: build-scan-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase repository
        run: echo "IMAGE_PREFIX=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Bump image tags in gitops/
        env:
          SHA: ${{ github.sha }}
          IMAGE_BASE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
        run: |
          for s in courses-api answers-ingest stats-aggregator teacher-api; do
            file="gitops/apps/$s/deployment.yaml"
            [ -f "$file" ] || continue
            sed -i -E "s|image: ${IMAGE_BASE}/${s}:.*|image: ${IMAGE_BASE}/${s}:${SHA}|" "$file"
          done
      - name: Commit & push
        run: |
          if git diff --quiet; then echo "no changes"; exit 0; fi
          git config user.email "ci@bot"
          git config user.name "CI Bot"
          git commit -am "chore(gitops): bump images to ${GITHUB_SHA::7}"
          git push
